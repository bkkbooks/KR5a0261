front:
  text: 擒玄賊果八
  hash: sha256:6f150ae5022abb7c1295651c9114944a9078053f9ac223213e7e2e24f89dbdb4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0261_HFL_000-001a, image: hfl/0121/0121-042.png}
body:
  text: 還丹周五行用成妙丹矣丹者剛而去柔還者终而復始斡隂陽而相制假魂魄以相求精鍊施生貫三清於乾馬昭符造化運一氣於坤牛原夫金丹之宗神氣之主決龍虎於震兌配水火於子午一男一女諧繾綣以三千一君一臣布生成於九五諒以卯酉爲衛離坎爲榮硏昇沈於八卦究順剋於五行溟涬之中觀無而成有虚無之內得重而成輕一則爲本爲元一則爲侍爲從賴黄君以匹配仗金白而作用淺深神室四時功而秋成表裏胞胎八月鍊而冬種豈不以天地交感之情日月㑹合而成水要凝而鉛結汞要乾而金并鳥兔投爐混成雞子之殼風雲入鼎鳴返嬰兒之聲美矣哉變几爲仙返老却少歲華易而猶在陵谷遷而轉妙三皇煅鍊功滿而白日飛昇群公著修行成而紫鳳來詔是則若延遐壽須假靈丹換凡骨而無濁成仙骨而禦寒紫府鼇宮欲去而鼎中鶴舞丹臺瓊苑擬遊而足下雲生所以宿遇真風生逢玄㫖周二義而並壽等三光而齊巳守中元而九轉修成抱一氣而萬物畢矣道生一天地含化斯為母矣漠漠玄玄浩浩無邊生自無名之始發當太一之前交錯施爲作化物之玄母氤氲含孕遂結象於先天水含其一火生其二橐籥動而生風隂陽媾而凝地屯蒙初判布兩曜而創形晝夜既分體三才而建位諒以龍行九五運應三田八卦生從於坤火五行出自於坎男數到少陽受坤艮而征敵终滿甲乙併金木以包含是則岀沒神爐廻還結舍九土潰而生養四時更而育化随宜應節水風順帀於三田普動含靈火龍行周於半夜豈不以一氣開闢太陽分跂日行暉於海下月呈曜於天淮水遇火而騰波清濁分也金得木而成土赤白在斯欽哉禀性分邢随機化見當衰旺於九五乃變通於三一散爲七寳成富國之竒珍擬作三花爲濟身之祥瑞故得陽極即滿金盛還虧物輕凊而方熟丹泯没而罷爲鉛屬陽精歸元而汞抛生死烹除隂滓媾合而豈有榮衰所以固守精神専持子母三者丹之用一者道之首還返各歸於本生天地咸同於老夀者也道源明本根芽修錬成藥源者萬物之母道者儀象之名道因源而爲孕源得道而愈生人聽不聞在施生而有象日用不見盖宿息而始明原夫天地之元父母之本或應丹房而安止或指泥丸而廵迅混沌分形於南北子孕母胞朦朧欲碧於浮沈隂居陽閫諒以朱含地魄銀抱天魂水是三才之祖精為元氣之根二景相通配作鼎爐之器四氣沖辯出入玄牝之門是以黒虎赤龍青根白帶離坎為土家宗祖土水爲金郷夫壻雪因水而方結血因金而相生汞遇鉛而始乾水憑土而可制豈不以隂陽符合造化同修鶴逐鸞飛勤勤而日投九鼎雲施雨驟息息而月降重樓是以龍主伏藏子時修錬四象凝而丹質三汞交而光電初離南國成秋石於爐中終返九天結金砂於海面但見淘盡隂滓鍜就陽精九轉易而丹畢四時功而道成飬就黄芽能點瓦而變玉鍊成白雪解返老而為嬰所以老壽乾坤身固丹藥登雲而六龍瓊輦適意而朱州靈閣翺翔而身隱壷天逍遥而路歸碧落矣龍虎龍虎相配投入金鼎火男配東坤婦為宗産彼虚無之國住自祝融之峯生數於三作離而因名甲虎徳稱於四變寅而故號庚龍原夫冠於仁風生從誕虎精得水而爲汞血遇金而成乳初名聖石霏霏而散作雲霞坎入崑崙瀝瀝而流歸風兩諒以東西剋伏上下相刑二八明而圓滿四象交而中央號自劉安論秋石而清潔名因花子體大鵬之飛翔是以形影相随魂魄相配鳥隱泰山之上兔岀華池之内一者為武佐火闕之樞機一者爲文侍明王之鼎器豈不筋骨為侣血肉相投納水鉛於金鼎逆日精於鐡牛過火即飛尋蹤而鬼神莫究逢虎乃凝顯化而天地難儔以彰乎流而忘温燠而有質隨黄輕而變化逐靈龜而出入三皇宫裏結紅雪以飄飄五帝壇前起黄雲而霫霫且夫水出山頂日見潭心鉛抱汞而成菡蓞火逼水而自隂霖鳯髓芝苗離塵體而無濁龍甲虎腦換凡骨以成金所以玄牝為門隂陽為鼎還元而萬亊皆畢老壽而二義終並超達而有路飛騰悞覓則去道遥逈秋石言曰金髓名喻秋名秋者自白而稱矣石者囚剛以名之遊自九萬之里生當一斤之期金水既分鉛銀以彰於有象子母乍見黒白以成於混儀原其爲物自精化魄遇隂火而始飛到金郷而變白初離銀礦隨黃雀入於天河纔返蟾宮逐清風流於地脉諒以欲乾清汞金仗白金子欲親而戀母陽要純而去隂貫滿則盈仙傳制伏之法精至必就孰憂損益之心异哉半夜方中一陽初超會赤白而相照運真水而清泚廻從尾穴杪若醎鉛之流形至中央已成紫金之體豈不以元氣之毋五味之精取同馬牙之寳斯立刀圭之名若嫁阿郞要在子孫而相允如婚楊女須假翁婆而曲成是以若保於金生先精於養素汞遇鉛兮不起土得水而相付色塋如玉自淮王而強名性急如龍因神農而假喻美哉至清至淨能剛能柔龍虎平分於卯酉隂陽盛滿於中秋輕清上徹於泥丸形如朱鳯重濁降自於華盖體若素流所以修飬於還丹貴自於金石枉將内寳以輕棄却取外珍而貴惜可憐天地之全身返作三尸之屋宅河車北方正氣名曰河車河者取天津而假象車者在地軸之立名水因輪而方運氣得車而始行秉正於中央居土而生成萬物纔臨於北位善和而陶鑄三清原夫土寄於離金處於北造丹為制伏之用居物有始终之徳一無正位凝爲變化之機一有流形混成黒白之色諒以三尊為祖四海為家周帀元君之宅行随阿母之車修飬金丹無比則如何措手安排神室其斯而始乃生芽是以出為鉛形入為金牲伏鬼下而柔潤頼良媒而匹娉或搬故濁杳杳而散出重樓或運新清息息而還歸中正豈不以神因樞轄伏自天河降汞火於金鼎結濛霧於滄波輕清散作風雲生於海内重濁變爲血肉下自山坡且夫雖布四方皆歸一味㝷兩路兮歸於爐鼎取三關兮入於脾胃后土循輙於卯酉乃運於流珠炎帝推車於子午受搬於和氣异哉施生萬物含孕五常法乾坤而作則契丹藥而是方兩降雲騰我則載歸源海月移星轉我則搬入洞房所以換除塵軀易成金骨大道修周於四季靈丹功全於十月則知愚人昩而進修賢人彰而指日者也五行隂陽精氣列布五方化育五行隂陽至精居天兮緫星之分鎮地兮得嶽之名休旺有時元含生殺之母樞機在要盛同造化之行原夫雖禀二儀皆歸一味青抱乾陽之精自籍坤隂之氣火生於北上蒸而含孕三才水長於南下降而分排五緯諒以絶臨正位遊注四方汞偶金而不起鉛得火而始翔一馬周遊皆克祗承於上帝四物盤礡自兹出沒於中央是以龍飛於九天鳯棲於丹穴崑山超霧禀陽而狀若紅鉛地户生雲到秋而形同白雪豈不以日行有序道順依常照方明而匪逺見五賊而自昌神氣若全飛騰在此鼎爐既備匹配由斯肇自沖和位分三五四溟兮為長飬之郷五藴兮為出入之户循環造化慿意馬以爲媒次第成形假水鉛而作主於南屬火在北屬隂設象以自分支干定體而孰辯浮沈日拘雌烏以鳴庚中有甲月舍雄雞以唱木内隱金是以結象自然流方四布假此爲表裏之宗用斯合乾坤之度未離而猶屬生死之門悟脱而定超神仙之路胎息服氣分明是内丹成胎者凝而成質息者聚而成丹五牙全而瞻戀二氣足以盤桓行布四肢駐風光而悅澤咽歸六府扶表裏以凊安原夫去自沖和飄然品𢑥入之根兮可保道之源而始貴熖熖四海承父母之元精浩浩三宫納乾坤之正氣諒以神爲氣主氣禀精成玄牝為出入之户身體作受盛之城漸息塵勞貴心神而不亂次調關節使血脉而易行是以床坐端居神光視内納新凊而瑩冷吐故濁而滋榮初離地户息息而過於重樓纔入天門綿綿而歴於三昧豈不神氣符合人道相明紛紛氣随於神化微微雨逐於風生存下華池流作霏霏之狀閉歸元海咽為轆轆之聲美哉根盛葉榮精枯人死鼓津液而虛受返本元而方盈凝住金鼎依依而形若彈丸結向荒田混混而狀同雞子且夫隂陽鼎異男女性分連連而氣通臟腑久久而身若風雲住世長年駐紅顔而美恱返老却少填赤體以氤氲所以求出世之功取四時而服適意而鸞輿前引登雲而龍駕浮迎身轉壯而羽翼生成氣長存而天香馥馨盗機如有行止機自來應盜者觀隂陽而可測機者克變通而逹諸是於柄大小而同用權動靜而亦如賢者見之而福至愚者輕之而禍餘原其法自虚無起諸妙有前為機而中物心見賊而延夀淮王昭㫖三盜動而成丹軒后明機萬物因而在手諒以喻以元象起自强名察神明之動體乾坤之行預度淺深所謂乎可法即法能量損益式昭乎可行即行爾乃志意深敦性情仰止天若發而含化人若發而成美陽昇隂降運神巧而出焉兔走烏飛在心識而見矣豈不以玄黄同得造化符機事非機而曷取道非徳而弗依坎户神爐我則窺門而入天街尾穴我則偷路而歸美哉竊有竊無賊天賊地在道而虛音萬物於我而用成大美庚龍甲虎契天人而曲成離女坎男貫還丹而有自故我德而無怠進而弗廻三傑之模非智十哲之賢不才秉道之人同天運而齊用修身之士到神助以斯來所以善惡盛分吉凶是應慕久視之休祥探長生之果證九年承覆載之深功驂鸞而仙鬟來迎累嵗荷隂陽之造化駕鶴而玉童皆至矣擒玄賊
